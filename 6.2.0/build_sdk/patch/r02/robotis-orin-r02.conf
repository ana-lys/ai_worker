source "${LDK_DIR}/p3701.conf.common";

TBCFILE="bootloader/uefi_jetson.bin";

ODMDATA="gbe-uphy-config-0,hsstp-lane-map-3,nvhs-uphy-config-0,hsio-uphy-config-0,enable-re26oc";

PINMUX_CONFIG="tegra234-mb1-bct-pinmux-p3701-0000-a04-robotis-r02.dtsi";
PMC_CONFIG="tegra234-mb1-bct-padvoltage-p3701-0000-a04.dtsi";
PMIC_CONFIG="tegra234-mb1-bct-pmic-p3701-0005.dts";
MB2_BCT="tegra234-mb2-bct-misc-p3701-0000-robotis-r02.dts";

DTB_FILE=tegra234-p3737-0000+p3701-0004-nv-robotis-r02.dtb;
TBCDTB_FILE="${DTB_FILE}";
BPFDTB_FILE="tegra234-bpmp-3701-0004-3737-0000.dtb";
OVERLAY_DTB_FILE="L4TConfiguration.dtbo,tegra234-p3737-0000+p3701-0000-dynamic-robotis-r02.dtbo,tegra234-carveouts.dtbo,tegra-optee.dtbo";
OVERLAY_DTB_FILE="${OVERLAY_DTB_FILE},tegra234-p3737-camera-re26oc-overlay-robotis.dtbo";

CMDLINE_ADD="mminit_loglevel=4 console=ttyTCU0,115200 console=ttyAMA0,115200 firmware_class.path=/etc/firmware fbcon=map:2 net.ifnames=0 nospectre_bhb video=efifb:off console=tty0" 
target_board="generic";



EMMC_CFG="flash_t234_qspi_sdmmc.xml";

# Rootfs A/B:
if [[ "${ROOTFS_AB}" == 1 && "${ROOTFS_ENC}" == "" ]]; then
	EMMC_CFG=flash_t234_qspi_sdmmc_rootfs_ab.xml;
# Disk encryption support:
elif [[ "${ROOTFS_AB}" == "" && "${ROOTFS_ENC}" == 1 ]]; then
	disk_enc_enable=1;
	EMMC_CFG=flash_t234_qspi_sdmmc_enc_rfs.xml;
# Rootfs A/B + Disk encryption support:
elif [[ "${ROOTFS_AB}" == 1 && "${ROOTFS_ENC}" == 1 ]]; then
	disk_enc_enable=1;
	EMMC_CFG=flash_t234_qspi_sdmmc_enc_rootfs_ab.xml;
fi;